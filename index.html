<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>GesssAI - LIVE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00d4aa">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GesssAI">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --font-scale: 1;
    --primary: #00d4aa;
    --primary-dark: #00a885;
    --danger: #ff4757;
    --warning: #ffa502;
    --success: #2ed573;
    --info: #1e90ff;
    --gold: #ffd700;
    --gold-glow: rgba(255, 215, 0, 0.6);
    --groq: #f55036;
    --bg-dark: #0a0e27;
    --bg-card: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.1);
    --text: #fff;
    --text-dim: #aaa;
  }
  body.light-theme {
    --bg-dark: #f5f7fa;
    --bg-card: rgba(255,255,255,0.9);
    --border: rgba(0,0,0,0.1);
    --text: #1a1a1a;
    --text-dim: #666;
  }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f2027 100%);
    color: var(--text);
    min-height: 100vh;
    padding: calc(15px * var(--font-scale));
    background-attachment: fixed;
    font-size: calc(14px * var(--font-scale));
    transition: background 0.3s ease, color 0.3s ease;
  }
  body.light-theme { background: linear-gradient(135deg, #e8eef5 0%, #d4dbe5 50%, #c5d0e0 100%); }
  header {
    text-align: center;
    padding: calc(15px * var(--font-scale)) calc(20px * var(--font-scale));
    background: linear-gradient(135deg, rgba(0,212,170,0.15), rgba(0,0,0,0.3));
    border-radius: calc(12px * var(--font-scale));
    margin-bottom: calc(15px * var(--font-scale));
    border: 1px solid rgba(0,212,170,0.3);
    position: relative;
  }
  .live-clock {
    position: absolute;
    top: 15px;
    left: 15px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    padding: 8px 16px;
    border-radius: 10px;
    font-weight: 800;
    color: #000;
    font-size: calc(1em * var(--font-scale));
    box-shadow: 0 4px 12px rgba(0,212,170,0.4);
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 10;
  }
  .live-clock .clock-icon { font-size: 1.3em; animation: clockPulse 2s infinite; }
  @keyframes clockPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  header h1 {
    font-size: calc(1.8em * var(--font-scale));
    background: linear-gradient(135deg, var(--primary), var(--text));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
    font-weight: 800;
  }
  header .subtitle { font-size: calc(0.9em * var(--font-scale)); color: var(--text-dim); }
  .view-toggle {
    position: absolute;
    top: 15px;
    right: 15px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,0,0,0.3);
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 1.7em;
  }
  .view-toggle:hover { background: rgba(0,0,0,0.5); }
  body.mobile-mode { padding: 8px; }
  body.mobile-mode header h1 { font-size: calc(1.3em * var(--font-scale)); }
  body.mobile-mode .tabs { flex-wrap: nowrap; overflow-x: auto; justify-content: flex-start; padding: 4px; }
  body.mobile-mode .tab { padding: 8px 12px; font-size: 0.8em; white-space: nowrap; flex-shrink: 0; }
  body.mobile-mode .match-item { padding: 8px 10px; }
  body.mobile-mode .team-box img { width: 36px; height: 36px; }
  body.mobile-mode .odds-grid { grid-template-columns: repeat(2, 1fr); }
  body.mobile-mode .multigol-section { grid-template-columns: 1fr; }
  body.mobile-mode .live-clock { font-size: 0.8em; padding: 5px 10px; top: 10px; left: 10px; }
  
  .main-wrapper { display: flex; gap: 15px; align-items: flex-start; width: 100%; }
  #content { flex: 1; min-width: 0; }
  .sidebar { width: 25%; flex-shrink: 0; display: none; position: sticky; top: 20px; }
  @media (max-width: 1000px) {
    .main-wrapper { flex-direction: column; }
    .sidebar { width: 100%; position: static; }
  }

  .config, .competition-selector {
    background: var(--bg-card);
    padding: calc(15px * var(--font-scale));
    border-radius: calc(10px * var(--font-scale));
    margin-bottom: calc(15px * var(--font-scale));
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
  }
  .config { border-left: 4px solid var(--warning); }
  .config-groq { border-left: 4px solid var(--groq); }
  .competition-selector { border-left: 4px solid var(--primary); }
  .config label, .competition-selector label { display: block; font-weight: 600; margin-bottom: 8px; font-size: calc(0.95em * var(--font-scale)); }
  .config input, .competition-selector select {
    padding: calc(10px * var(--font-scale)) calc(12px * var(--font-scale));
    width: 100%;
    border-radius: calc(6px * var(--font-scale));
    border: 1px solid var(--border);
    background: rgba(0,0,0,0.4);
    color: var(--text);
    font-size: calc(0.95em * var(--font-scale));
    margin-bottom: 10px;
  }
  body.light-theme .config input, body.light-theme .competition-selector select { background: #fff; color: #1a1a1a; }
  .config button {
    padding: calc(10px * var(--font-scale)) calc(20px * var(--font-scale));
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border: none;
    border-radius: calc(6px * var(--font-scale));
    cursor: pointer;
    font-weight: 700;
    color: #000;
    transition: 0.3s;
    width: 100%;
    font-size: calc(0.95em * var(--font-scale));
  }
  .config button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,212,170,0.4); }
  .btn-groq { background: linear-gradient(135deg, var(--groq), #d9432f) !important; color: #fff !important; }
  .config small { display: block; color: var(--text-dim); font-size: calc(0.8em * var(--font-scale)); margin-top: 8px; }
  .theme-toggle-container { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
  .theme-toggle-label { display: flex; align-items: center; justify-content: space-between; cursor: pointer; padding: 10px 0; }
  .theme-toggle-text { font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .theme-switch { position: relative; width: 60px; height: 32px; background: rgba(255,255,255,0.2); border-radius: 16px; transition: background 0.3s; }
  body.light-theme .theme-switch { background: rgba(0,0,0,0.1); }
  .theme-switch.active { background: var(--primary); }
  .theme-switch-slider { position: absolute; top: 3px; left: 3px; width: 26px; height: 26px; background: #fff; border-radius: 50%; box-shadow: 0 2px 6px rgba(0,0,0,0.3); transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .theme-switch.active .theme-switch-slider { transform: translateX(28px); }
  .font-slider-container { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
  .font-slider-label { font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
  .font-slider { width: 100%; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.2); outline: none; -webkit-appearance: none; }
  body.light-theme .font-slider { background: rgba(0,0,0,0.1); }
  .font-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--primary); cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
  .font-slider::-moz-range-thumb { width: 22px; height: 22px; border-radius: 50%; background: var(--primary); cursor: pointer; border: none; }
  .font-slider-value { text-align: center; margin-top: 8px; font-size: 1.7em; color: var(--text-dim); }
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 12px; padding: 6px; background: var(--bg-card); border-radius: 10px; backdrop-filter: blur(10px); }
  .tab { padding: calc(10px * var(--font-scale)) calc(16px * var(--font-scale)); background: transparent; border: none; color: var(--text-dim); border-radius: 6px; cursor: pointer; font-size: calc(0.9em * var(--font-scale)); font-weight: 600; transition: all 0.3s; }
  .tab:hover { background: rgba(255,255,255,0.1); color: var(--text); }
  body.light-theme .tab:hover { background: rgba(0,0,0,0.05); }
  .tab.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #000; box-shadow: 0 4px 12px rgba(0,212,170,0.3); }
  .panel { background: var(--bg-card); padding: calc(15px * var(--font-scale)); border-radius: calc(12px * var(--font-scale)); border: 1px solid var(--border); min-height: 200px; backdrop-filter: blur(10px); }
  .panel h2 { margin-bottom: 12px; font-size: calc(1.3em * var(--font-scale)); color: var(--primary); border-bottom: 2px solid var(--border); padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
  .btn-today { padding: 6px 14px; background: linear-gradient(135deg, var(--gold), #e6c200); border: none; border-radius: 6px; cursor: pointer; font-weight: 700; color: #000; font-size: calc(0.85em * var(--font-scale)); transition: 0.3s; }
  .btn-today:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--gold-glow); }
  .matchday-header { background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(0,0,0,0.3)); border: 1px solid var(--gold); border-radius: 8px; padding: 8px 15px; margin: 12px 0 8px 0; font-size: calc(1em * var(--font-scale)); font-weight: 700; color: var(--gold); text-align: center; scroll-margin-top: 20px; }
  .matchday-header.current-day { background: linear-gradient(135deg, rgba(255,215,0,0.3), rgba(255,215,0,0.1)); border: 2px solid var(--gold); box-shadow: 0 0 20px var(--gold-glow); }
  
  .competition-header {
    background: linear-gradient(135deg, rgba(0,212,170,0.2), rgba(0,212,170,0.05));
    border: 2px solid var(--primary);
    border-radius: 10px;
    padding: 12px 18px;
    margin: 20px 0 10px 0;
    font-size: calc(1.15em * var(--font-scale));
    font-weight: 800;
    color: var(--primary);
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 0 15px rgba(0,212,170,0.2);
  }
  
  .match-item { display: flex; flex-direction: column; padding: calc(12px * var(--font-scale)) calc(15px * var(--font-scale)); margin: 6px 0; background: linear-gradient(135deg, rgba(0,0,0,0.3), rgba(0,0,0,0.2)); border-radius: 8px; border: 1px solid var(--border); cursor: pointer; transition: all 0.3s ease; }
  body.light-theme .match-item { background: rgba(255,255,255,0.6); }
  .match-item:hover { transform: translateY(-2px); border-color: var(--primary); box-shadow: 0 4px 16px rgba(0,212,170,0.2); }
  .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .match-status { display: flex; align-items: center; gap: 6px; font-weight: 800; font-size: calc(0.9em * var(--font-scale)); }
  .match-status.live { color: var(--danger); }
  .match-status.finished { color: var(--success); }
  .match-status.scheduled { color: var(--info); }
  .match-info { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 15px; margin-bottom: 8px; }
  .team { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: calc(0.95em * var(--font-scale)); }
  .team.home { justify-content: flex-end; text-align: right; }
  .team.away { justify-content: flex-start; text-align: left; }
  .team img, .team-logo { width: calc(24px * var(--font-scale)); height: calc(24px * var(--font-scale)); object-fit: contain; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 1em; background: rgba(0,0,0,0.3); flex-shrink: 0; }
  .score-display { font-size: calc(1.4em * var(--font-scale)); font-weight: 800; color: var(--success); padding: 4px 12px; background: rgba(0,0,0,0.3); border-radius: 6px; transition: all 0.5s ease; }
  .score-display.score-updated { animation: scoreFlash 1.5s ease; }
  @keyframes scoreFlash {
    0% { transform: scale(1); color: var(--success); }
    25% { transform: scale(1.2); color: var(--gold); text-shadow: 0 0 15px var(--gold); }
    50% { transform: scale(1.1); color: var(--danger); text-shadow: 0 0 15px var(--danger); }
    100% { transform: scale(1); color: var(--success); }
  }
  body.light-theme .score-display { background: rgba(0,0,0,0.1); }
  .match-details { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; font-size: calc(0.85em * var(--font-scale)); color: var(--text-dim); padding-top: 8px; border-top: 1px solid var(--border); position: relative; }
  .match-meta { display: flex; gap: 15px; flex-wrap: wrap; }
  .match-meta-item { display: flex; align-items: center; gap: 4px; }
  .competition-badge {
    display: inline-block;
    padding: 3px 10px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #000;
    border-radius: 12px;
    font-size: calc(0.8em * var(--font-scale));
    font-weight: 800;
    margin-left: 6px;
  }
  .live-dot { display: inline-block; width: 10px; height: 10px; background: var(--danger); border-radius: 50%; animation: livePulse 1.5s infinite; box-shadow: 0 0 8px var(--danger); }
  @keyframes livePulse { 0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 8px var(--danger); } 50% { opacity: 0.4; transform: scale(0.8); box-shadow: 0 0 16px var(--danger); } }
  .match-item.live-match { background: linear-gradient(135deg, rgba(255,71,87,0.1), rgba(255,71,87,0.05)); border-left: 4px solid var(--danger); animation: liveGlow 3s infinite; }
  @keyframes liveGlow { 0%, 100% { box-shadow: 0 0 10px rgba(255,71,87,0.2); } 50% { box-shadow: 0 0 20px rgba(255,71,87,0.4); } }
  body.light-theme .match-item.live-match { background: linear-gradient(135deg, rgba(255,71,87,0.08), rgba(255,71,87,0.03)); }
  
  .match-detail { background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(0,0,0,0.3)); border-radius: 12px; padding: 15px; border: 1px solid var(--border); }
  body.light-theme .match-detail { background: rgba(255,255,255,0.6); }
  .detail-header { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
  .detail-header-item { text-align: center; }
  .detail-header-label { font-size: calc(0.8em * var(--font-scale)); color: var(--text-dim); margin-bottom: 3px; }
  .detail-header-value { font-size: calc(1em * var(--font-scale)); font-weight: 700; color: var(--primary); }
  .teams-section { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; margin-bottom: 15px; align-items: center; }
  .team-box { text-align: center; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 10px; }
  body.light-theme .team-box { background: rgba(255,255,255,0.6); }
  .team-box img, .team-box .team-logo-large { width: calc(48px * var(--font-scale)); height: calc(48px * var(--font-scale)); margin-bottom: 6px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 2em; background: rgba(0,0,0,0.3); }
  .team-box .team-name { font-size: calc(1em * var(--font-scale)); font-weight: 700; margin-bottom: 4px; }
  .team-box .team-stats { font-size: calc(0.8em * var(--font-scale)); color: var(--text-dim); }
  .result-box { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .result-score { font-size: calc(2em * var(--font-scale)); font-weight: 800; color: var(--success); border: 2px solid var(--success); padding: 10px 20px; border-radius: 10px; }
  .form-section { margin-bottom: 12px; }
  .form-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; align-items: center; }
  .form-box { background: rgba(0,0,0,0.3); padding: 8px 12px; border-radius: 8px; }
  body.light-theme .form-box { background: rgba(255,255,255,0.6); }
  .form-label { font-size: calc(0.8em * var(--font-scale)); color: var(--text-dim); margin-bottom: 6px; text-align: center; }
  .form-results { display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; }
  .form-result { width: calc(28px * var(--font-scale)); height: calc(28px * var(--font-scale)); line-height: calc(28px * var(--font-scale)); text-align: center; border-radius: 5px; font-weight: 700; font-size: calc(0.85em * var(--font-scale)); position: relative; cursor: pointer; transition: transform 0.2s ease; }
  .form-result:hover { transform: scale(1.15); z-index: 10; }
  .form-result.V { background: var(--success); color: #000; }
  .form-result.P { background: var(--warning); color: #000; }
  .form-result.S { background: var(--danger); color: #fff; }
  .form-tooltip { position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.95); color: #fff; padding: 8px 12px; border-radius: 8px; font-size: calc(0.85em * var(--font-scale)); font-weight: 700; white-space: nowrap; opacity: 0; visibility: hidden; transition: all 0.25s ease; pointer-events: none; z-index: 1000; box-shadow: 0 4px 16px rgba(0,0,0,0.5); border: 1px solid var(--gold); }
  body.light-theme .form-tooltip { background: rgba(30, 30, 30, 0.98); }
  .form-tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: rgba(0, 0, 0, 0.95); }
  .form-result:hover .form-tooltip { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(-2px); }
  .tooltip-score { color: var(--gold); font-size: 1.1em; margin-left: 6px; }
  .tooltip-opponent { color: var(--text-dim); font-size: 0.9em; display: block; margin-top: 2px; }
  
  .odds-section { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 10px; margin-bottom: 10px; }
  body.light-theme .odds-section { background: rgba(255,255,255,0.6); }
  .section-title { text-align: center; font-size: calc(0.95em * var(--font-scale)); font-weight: 700; color: var(--primary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .odds-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .odds-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .odds-grid-3 .odd-box { padding: 12px; }
  .odds-grid-3 .odd-value { font-size: calc(1.3em * var(--font-scale)); }
  .odd-box { background: rgba(255,255,255,0.05); padding: 10px 8px; border-radius: 6px; text-align: center; border: 1px solid var(--border); transition: 0.3s; cursor: pointer; position: relative; }
  body.light-theme .odd-box { background: rgba(0,0,0,0.05); }
  .odd-box:hover { border-color: var(--primary); transform: translateY(-2px); }
  .odd-box.selected { background: linear-gradient(135deg, rgba(0,212,170,0.3), rgba(0,212,170,0.1)); border: 2px solid var(--primary); box-shadow: 0 0 12px rgba(0,212,170,0.4); }
  .odd-box.pending { background: linear-gradient(135deg, rgba(255,165,2,0.3), rgba(255,165,2,0.1)); border: 2px dashed var(--warning); animation: pendingPulse 1.5s infinite; }
  @keyframes pendingPulse { 0%, 100% { box-shadow: 0 0 8px rgba(255,165,2,0.3); } 50% { box-shadow: 0 0 20px rgba(255,165,2,0.6); } }
  .odd-label { font-size: calc(0.8em * var(--font-scale)); color: var(--text-dim); margin-bottom: 3px; }
  .odd-value { font-size: calc(1.1em * var(--font-scale)); font-weight: 700; color: var(--warning); margin-bottom: 4px; }
  .odd-box.highlight { background: linear-gradient(135deg, rgba(255,215,0,0.25), rgba(255,215,0,0.1)); border: 2px solid var(--gold); box-shadow: 0 0 12px var(--gold-glow), inset 0 0 8px rgba(255,215,0,0.2); transform: scale(1.03); }
  .odd-box.highlight .odd-value { color: var(--gold); font-size: calc(1.25em * var(--font-scale)); text-shadow: 0 0 8px var(--gold-glow); }
  .odd-box.highlight .odd-label { color: var(--gold); font-weight: 700; }
  
  .multigol-section { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px; }
  .multigol-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; }
  body.light-theme .multigol-box { background: rgba(255,255,255,0.6); }
  .multigol-title { text-align: center; font-weight: 700; margin-bottom: 8px; color: var(--info); font-size: calc(0.95em * var(--font-scale)); }
  .multigol-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  
  .ai-section { background: linear-gradient(135deg, rgba(245,80,54,0.1), rgba(0,0,0,0.3)); border: 2px solid var(--groq); border-radius: 10px; padding: 15px; margin-top: 12px; }
  body.light-theme .ai-section { background: rgba(245,80,54,0.05); }
  .ai-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .ai-title { font-size: calc(1.1em * var(--font-scale)); font-weight: 700; color: var(--groq); }

  @keyframes slideUp { from { transform: translate(-50%, 100px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

<body>

<header>
  <div class="live-clock">
    <span class="clock-icon">⏱️</span>
    <span id="liveDateTime"></span>
  </div>
  <h1>⚽ GesssAI - LIVE</h1>
  <p class="subtitle">Statistiche, risultati e pronostici avanzati con AI</p>
  <div class="view-toggle" onclick="toggleViewMode()" title="Cambia vista PC/Mobile">
    <span class="view-toggle-icon" id="viewIcon">🖥️</span>
    <span id="viewLabel">PC</span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('upcoming', this)">📋 Palinsesto</button>
  <button class="tab" onclick="showTab('results', this)">✅ Risultati</button>
  <button class="tab" onclick="showTab('standings', this)">🏆 Classifica</button>
  <button class="tab" onclick="showTab('slip', this)">🎫 Schedina AI</button>
  <button class="tab" onclick="showTab('settings', this)">⚙️ Impostazioni</button>
</div>

<div class="main-wrapper">
  <div id="content" class="panel">
    <div class="loader">Caricamento...</div>
  </div>
  
  <div id="sidebar" class="panel sidebar">
    <div class="loader">Caricamento classifica...</div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<footer>
  <p>⚽ GesssAI - LIVE • Cache: 24h • AI: GROQ</p>
</footer>

<script>
const API_BASE = '/api-football/v4';
const CACHE_DURATION = 4 * 24 * 60 * 60 * 1000;

const LEAGUE_MAPPING = {
  'ALL': { apiId: 'all', season: 2025, online: true, name: 'Tutti i Campionati' },
  'WC':  { apiId: 1,   season: 2026, online: true, name: 'FIFA World Cup 2026' },
  'SA':  { apiId: 135, season: 2025, online: true, name: 'Serie A' },
  'PL':  { apiId: 39,  season: 2025, online: true, name: 'Premier League' },
  'PD':  { apiId: 140, season: 2025, online: true, name: 'La Liga' },
  'BL1': { apiId: 78,  season: 2025, online: true, name: 'Bundesliga' },
  'FL1': { apiId: 61,  season: 2025, online: true, name: 'Ligue 1' },
  'CL':  { apiId: 2,   season: 2025, online: true, name: 'Champions League' },
  'EL':  { apiId: 3,   season: 2025, online: true, name: 'Europa League' },
  'EC':  { apiId: 4,   season: 2024, online: true, name: 'Campionato Europeo' },
  'PPL': { apiId: 94,  season: 2025, online: true, name: 'Primeira Liga' },
  'DED': { apiId: 88,  season: 2025, online: true, name: 'Eredivisie' },
  'BSA': { apiId: 71,  season: 2025, online: true, name: 'Brasileirão' },
  'CLI': { apiId: 265, season: 2025, online: true, name: 'Copa Libertadores' },
  'ARG': { apiId: 128, season: 2025, online: true, name: 'Liga Profesional' },
  'MLS': { apiId: 253, season: 2025, online: true, name: 'MLS' }
};

function getCompetitionName(key) {
  return LEAGUE_MAPPING[key]?.name || key;
}

function getCompetitionEmoji(key) {
  const emojis = {
    'WC': '🌍', 'SA': '🇮🇹', 'PL': '🏴', 'PD': '🇪🇸', 'BL1': '🇩🇪', 'FL1': '🇫🇷',
    'CL': '🏆', 'EL': '🏆', 'EC': '🇪🇺', 'PPL': '🇵🇹', 'DED': '🇳🇱', 'BSA': '🇧🇷',
    'CLI': '🏆', 'ARG': '🇦🇷', 'MLS': '🇺🇸', 'ALL': '🌐'
  };
  return emojis[key] || '⚽';
}

const TEAM_LOGOS = {
  'Italy': '🇮🇹', 'Italia': '🇮🇹', 'France': '🇫🇷', 'Francia': '🇫🇷', 'Germany': '🇩🇪', 'Germania': '🇩🇪',
  'Spain': '🇪🇸', 'Spagna': '🇪🇸', 'England': '🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'Inghilterra': '🏴󠁧󠁢󠁥󠁮󠁧󠁿',
  'Norway': '🇳🇴', 'Norvegia': '🇳🇴', 'Sweden': '🇸🇪', 'Svezia': '🇸🇪', 'Finland': '🇫🇮', 'Finlandia': '🇫🇮',
  'Canada': '🇨🇦', 'Kazakhstan': '🇰🇿', 'Kazakistan': '🇰🇿', 'Ireland': '🇮🇪', 'Irlanda': '🇮🇪',
  'Luxembourg': '🇱🇺', 'Lussemburgo': '🇱🇺',
  'Juventus': '⚪', 'Inter': '⚫', 'Milan': '🔴', 'Napoli': '🔵',
  'Real Madrid': '⚪', 'Barcellona': '🔵', 'Bayern Monaco': '🔴', 'PSG': '🔴🔵'
};

function getTeamLogo(teamName) {
  if (!teamName) return '⚽';
  if (TEAM_LOGOS[teamName]) return TEAM_LOGOS[teamName];
  const normalized = teamName.toLowerCase();
  for (const key in TEAM_LOGOS) {
    if (normalized.includes(key.toLowerCase()) || key.toLowerCase().includes(normalized)) {
      return TEAM_LOGOS[key];
    }
  }
  return '⚽';
}

function renderLogo(teamName, size = '') {
  const logo = getTeamLogo(teamName);
  const sizeClass = size === 'large' ? 'team-logo-large' : 'team-logo';
  return `<span class="${sizeClass}" title="${teamName}">${logo}</span>`;
}

let API_KEY = localStorage.getItem('fdApiKey') || '';
let GROQ_KEY = localStorage.getItem('groqApiKey') || '';
let CURRENT_COMPETITION = localStorage.getItem('fdCompetition') || 'ALL';
let currentTab = 'upcoming';
let currentMatch = null;
let allMatchesCache = null;
let currentSlip = JSON.parse(localStorage.getItem('currentSlip') || 'null') || { picks: [] };
let viewMode = localStorage.getItem('viewMode') || 'pc';
let pendingPick = null;
let selectedFilterDate = null;
let lastLiveScores = {};

const savedTheme = localStorage.getItem('theme') || 'dark';
if (savedTheme === 'light') document.body.classList.add('light-theme');

const savedFontScale = parseFloat(localStorage.getItem('fontScale')) || 1;
document.documentElement.style.setProperty('--font-scale', savedFontScale);

if (viewMode === 'mobile') {
  document.body.classList.add('mobile-mode');
  document.getElementById('viewIcon').textContent = '📱';
  document.getElementById('viewLabel').textContent = 'Mobile';
}

// ===== OROLOGIO LIVE =====
function updateLiveClock() {
  const now = new Date();
  const dayNames = ['Domenica', 'Lunedì', 'Martedì', 'Mercoledì', 'Giovedì', 'Venerdì', 'Sabato'];
  const monthNames = ['Gennaio', 'Febbraio', 'Marzo', 'Aprile', 'Maggio', 'Giugno', 'Luglio', 'Agosto', 'Settembre', 'Ottobre', 'Novembre', 'Dicembre'];
  const dayName = dayNames[now.getDay()];
  const day = now.getDate();
  const month = monthNames[now.getMonth()];
  const hours = String(now.getHours()).padStart(2, '0');
  const minutes = String(now.getMinutes()).padStart(2, '0');
  const seconds = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('liveDateTime').textContent = `${dayName} ${day} ${month} • ${hours}:${minutes}:${seconds}`;
}
updateLiveClock();
setInterval(updateLiveClock, 1000);

function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(100%)';
    setTimeout(() => toast.remove(), 300);
  }, 4000);
}

function showPendingBanner(pick) {
  removePendingBanner();
  const banner = document.createElement('div');
  banner.className = 'pending-banner';
  banner.id = 'pendingBanner';
  banner.innerHTML = `<span>⏳ In attesa di 2ª giocata per combo...</span><button class="btn-cancel-pending" onclick="cancelPending()">✕ Annulla</button>`;
  document.body.appendChild(banner);
}

function removePendingBanner() {
  const existing = document.getElementById('pendingBanner');
  if (existing) existing.remove();
}

function cancelPending() {
  pendingPick = null;
  removePendingBanner();
  document.querySelectorAll('.odd-box.pending').forEach(el => el.classList.remove('pending'));
  showToast('⏹️ Selezione annullata');
}

function toggleViewMode() {
  const body = document.body;
  if (body.classList.contains('mobile-mode')) {
    body.classList.remove('mobile-mode');
    document.getElementById('viewIcon').textContent = '🖥️';
    document.getElementById('viewLabel').textContent = 'PC';
    localStorage.setItem('viewMode', 'pc');
    showToast('🖥️ Vista PC attivata');
  } else {
    body.classList.add('mobile-mode');
    document.getElementById('viewIcon').textContent = '📱';
    document.getElementById('viewLabel').textContent = 'Mobile';
    localStorage.setItem('viewMode', 'mobile');
    showToast('📱 Vista Mobile attivata');
  }
}

function saveKey() {
  API_KEY = document.getElementById('apiKey').value.trim();
  localStorage.setItem('fdApiKey', API_KEY);
  clearAllCache();
  showToast('✅ Chiave football-data.org salvata!');
}

function saveGroqKey() {
  GROQ_KEY = document.getElementById('groqKey').value.trim();
  localStorage.setItem('groqApiKey', GROQ_KEY);
  showToast('✅ Chiave GROQ salvata!');
  if (currentMatch) showMatchDetail(currentMatch);
}

function changeCompetition() {
  CURRENT_COMPETITION = document.getElementById('competitionSelect').value;
  localStorage.setItem('fdCompetition', CURRENT_COMPETITION);
  allMatchesCache = null;
  if (currentTab !== 'settings') loadCurrentTab();
}

function showTab(tab, btn) {
  currentTab = tab;
  document.getElementById('sidebar').style.display = 'none';

  if (tab !== 'settings' && tab !== 'slip') currentMatch = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (tab === 'settings') showSettings();
  else if (tab === 'slip') showSlip();
  else loadCurrentTab();
}

function showSettings() {
  const content = document.getElementById('content');
  const isLight = document.body.classList.contains('light-theme');
  const currentFontScale = parseFloat(localStorage.getItem('fontScale')) || 1;
  
  let optionsHtml = '';
  for (const key in LEAGUE_MAPPING) {
    const emoji = getCompetitionEmoji(key);
    const name = getCompetitionName(key);
    const selected = CURRENT_COMPETITION === key ? 'selected' : '';
    optionsHtml += `<option value="${key}" ${selected}>${emoji} ${name}</option>`;
  }
  
  content.innerHTML = `
    <h2>⚙️ Impostazioni</h2>
    <div class="competition-selector">
      <label>🏆 Competizione Predefinita</label>
      <select id="competitionSelect" onchange="changeCompetition()">
        ${optionsHtml}
      </select>
    </div>
    <div class="config">
      <label>🔑 API Key (football-data.org)</label>
      <input type="text" id="apiKey" placeholder="Incolla qui la tua API key" value="${API_KEY}">
      <button onclick="saveKey()">💾 Salva API Key</button>
      <small>Ottienila gratis su: football-data.org/client/register</small>
    </div>
    <div class="config config-groq">
      <label>🤖 GROQ API Key</label>
      <input type="text" id="groqKey" placeholder="gsk_... (da console.groq.com)" value="${GROQ_KEY}">
      <button class="btn-groq" onclick="saveGroqKey()">💾 Salva GROQ</button>
      <small>Gratis su console.groq.com • Modello: Llama 3.3 70B</small>
    </div>
    <div class="theme-toggle-container">

        <div class="theme-switch ${isLight ? 'active' : ''}" id="themeSwitch">
          <div class="theme-switch-slider">${isLight ? '☀️' : '🌙'}</div>
        </div>
      </label>
    </div>

  setTimeout(() => {

function toggleTheme() {
  const body = document.body;
  const themeSwitch = document.getElementById('themeSwitch');
  const isLight = body.classList.contains('light-theme');
  if (isLight) {
    body.classList.remove('light-theme');
    themeSwitch.classList.remove('active');
    themeSwitch.querySelector('.theme-switch-slider').textContent = '🌙';
    localStorage.setItem('theme', 'dark');
  } else {
    body.classList.add('light-theme');
    themeSwitch.classList.add('active');
    themeSwitch.querySelector('.theme-switch-slider').textContent = '☀️';
    localStorage.setItem('theme', 'light');
  }
}

function getCache(key, duration = CACHE_DURATION) {
  const cached = localStorage.getItem('cache_' + key);
  if (!cached) return null;
  try {
    const data = JSON.parse(cached);
    if (Date.now() - data.timestamp > duration) { localStorage.removeItem('cache_' + key); return null; }
    return data.value;
  } catch { return null; }
}

function setCache(key, value) {
  localStorage.setItem('cache_' + key, JSON.stringify({ timestamp: Date.now(), value }));
}

function clearAllCache() {
  Object.keys(localStorage).filter(k => k.startsWith('cache_')).forEach(k => localStorage.removeItem(k));
}

function getCacheInfo() {
  const keys = Object.keys(localStorage).filter(k => k.startsWith('cache_'));
  if (keys.length === 0) return 'Cache vuota';
  let totalSize = 0, oldest = Date.now();
  keys.forEach(k => {
    totalSize += localStorage.getItem(k).length;
    try {
      const data = JSON.parse(localStorage.getItem(k));
      if (data.timestamp < oldest) oldest = data.timestamp;
    } catch {}
  });
  const daysLeft = Math.ceil((CACHE_DURATION - (Date.now() - oldest)) / (24*60*60*1000));
  return `ONLINE • ${keys.length} elementi • ${(totalSize/1024).toFixed(1)} KB • Scade tra ${daysLeft} giorni`;
}

async function apiFetch(endpoint, useCache = true, competitionKey = CURRENT_COMPETITION) {
  const cacheKey = competitionKey + '_' + endpoint;
  if (useCache) {
    const cached = getCache(cacheKey);
    if (cached) return cached;
  }
  try {
    const fullUrl = API_BASE + endpoint;
    const res = await fetch(fullUrl, { headers: { 'X-Auth-Token': API_KEY }, method: 'GET' });
    if (!res.ok) {
      const errorText = await res.text();
      if (res.status === 404) throw new Error(`Campionato non disponibile (404).`);
      throw new Error(`HTTP ${res.status}: ${errorText}`);
    }
    const data = await res.json();
    setCache(cacheKey, data);
    return data;
  } catch (error) {
    console.error('❌ Fetch fallito:', error);
    throw error;
  }
}

// ===== CARICAMENTO TUTTI I CAMPIONATI O SINGOLO =====
async function loadAllMatches(forceRefresh = false) {
  if (allMatchesCache && !forceRefresh) return allMatchesCache;
  const cacheKey = CURRENT_COMPETITION + '_all_matches';
  const cached = getCache(cacheKey);
  if (cached && !forceRefresh) { allMatchesCache = cached; return cached; }
  
  try {
    let allMatches = [];
    
    if (CURRENT_COMPETITION === 'ALL') {
      // Carica tutti i campionati principali
      const leagueKeys = Object.keys(LEAGUE_MAPPING).filter(k => k !== 'ALL' && LEAGUE_MAPPING[k].online);
      const promises = leagueKeys.map(async (key) => {
        try {
          const comp = LEAGUE_MAPPING[key];
          const cacheKeyComp = key + '_matches';
          let data = getCache(cacheKeyComp);
          if (!data) {
            const res = await fetch(API_BASE + `/competitions/${comp.apiId}/matches`, {
              headers: { 'X-Auth-Token': API_KEY }, method: 'GET'
            });
            if (res.ok) {
              data = await res.json();
              setCache(cacheKeyComp, data);
            }
          }
          if (data && data.matches) {
            return data.matches.map(m => ({
              ...m,
              _competitionKey: key,
              _competitionName: comp.name,
              _competitionEmoji: getCompetitionEmoji(key)
            }));
          }
          return [];
        } catch (e) {
          console.error(`Errore campionato ${key}:`, e);
          return [];
        }
      });
      
      const results = await Promise.all(promises);
      allMatches = results.flat();
    } else {
      const comp = LEAGUE_MAPPING[CURRENT_COMPETITION];
      const data = await apiFetch(`/competitions/${comp.apiId}/matches`, false);
      allMatches = (data.matches || []).map(m => ({
        ...m,
        _competitionKey: CURRENT_COMPETITION,
        _competitionName: comp.name,
        _competitionEmoji: getCompetitionEmoji(CURRENT_COMPETITION)
      }));
    }
    
    allMatchesCache = allMatches;
    setCache(cacheKey, allMatches);
    return allMatches;
  } catch (e) {
    console.error('Errore caricamento partite:', e);
    showToast('❌ Errore nel caricamento delle partite', 'error');
    return [];
  }
}

function getRealMatchStatus(m) {
  const now = new Date();
  const matchDate = new Date(m.utcDate);
  const diffMs = now - matchDate;
  const diffMinutes = Math.floor(diffMs / (1000 * 60));
  if (m.status === 'FINISHED') return 'FINISHED';
  if (diffMinutes > 120) return 'FINISHED';
  if (diffMinutes >= 0 && diffMinutes <= 120) return 'IN_PLAY';
  return 'SCHEDULED';
}

function isInternationalCompetition() {
  return ['WC', 'EC', 'CL', 'EL'].includes(CURRENT_COMPETITION);
}

function renderMatchItem(m, clickable = false, showResult = false) {
  const homeLogo = m.homeTeam.crest || '';
  const awayLogo = m.awayTeam.crest || '';
  const homeName = m.homeTeam.shortName || m.homeTeam.name;
  const awayName = m.awayTeam.shortName || m.awayTeam.name;
  const homeEmoji = renderLogo(homeName);
  const awayEmoji = renderLogo(awayName);
  const date = new Date(m.utcDate);
  const dateStr = date.toLocaleDateString('it-IT', { day:'2-digit', month:'2-digit', year:'numeric' });
  const timeStr = date.toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
  const realStatus = getRealMatchStatus(m);
  
  const compName = m._competitionName || getCompetitionName(m._competitionKey || CURRENT_COMPETITION);
  const compEmoji = m._competitionEmoji || getCompetitionEmoji(m._competitionKey || CURRENT_COMPETITION);
  const compBadge = `<span class="competition-badge">${compEmoji} ${compName}</span>`;
  
  let statusHtml = '';
  let scoreHome = 0;
  let scoreAway = 0;
  let isLive = false;
  let isFinished = false;
  
  if (realStatus === 'FINISHED') {
    isFinished = true;
    scoreHome = m.score?.fullTime?.home ?? m.score?.halfTime?.home ?? 0;
    scoreAway = m.score?.fullTime?.away ?? m.score?.halfTime?.away ?? 0;
    statusHtml = `<span>✅ Terminata</span>`;
  } else if (realStatus === 'IN_PLAY') {
    isLive = true;
    scoreHome = m.score?.fullTime?.home ?? m.score?.halfTime?.home ?? 0;
    scoreAway = m.score?.fullTime?.away ?? m.score?.halfTime?.away ?? 0;
    const now = new Date();
    const matchDate = new Date(m.utcDate);
    const diffMinutes = Math.floor((now - matchDate) / (1000 * 60));
    const minute = m.minute || Math.max(1, diffMinutes);
    statusHtml = `<span class="live-dot"></span><span>${minute}' LIVE</span>`;
  } else {
    scoreHome = '-';
    scoreAway = '-';
    statusHtml = `<span>📅 ${timeStr}</span>`;
  }
  
  const statusClass = isLive ? 'live' : (isFinished ? 'finished' : 'scheduled');
  const scoreId = `score-${m.id}`;
  const onClick = clickable ? `onclick='openMatchDetail(${JSON.stringify(m).replace(/'/g, "\\'")})'` : '';
  const groupText = m.group || m.stage || '';
  const showGroup = isInternationalCompetition() && groupText;
  const groupDisplay = showGroup ? `[${groupText}]` : 'Da Giocare';
  
  return `
    <div class="match-item ${isLive ? 'live-match' : ''}" ${onClick} style="position:relative" data-match-id="${m.id}">
      <div class="match-header">
        <div class="match-status ${statusClass}">${statusHtml}</div>
        <div style="color:var(--text-dim);font-size:0.8em">${dateStr} • ${groupDisplay} • ${timeStr} ${compBadge}</div>
      </div>
      <div class="match-info">
        <div class="team home">${homeLogo ? `<img src="${homeLogo}" alt="">` : homeEmoji}<span>${homeName}</span></div>
        <div class="score-display" id="${scoreId}">[${scoreHome} - ${scoreAway}]</div>
        <div class="team away"><span>${awayName}</span>${awayLogo ? `<img src="${awayLogo}" alt="">` : awayEmoji}</div>
      </div>
      <div class="match-details">
        <div class="match-meta"><div class="match-meta-item">Giornata: ${m.matchday || '?'}</div></div>
      </div>
    </div>`;
}

// ===== CARICA PALINSESTO CON FILTRO DATA =====
async function loadUpcomingMatches() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loader">Caricamento...</div>';
  try {
    allMatchesCache = null;
    const allMatches = await loadAllMatches();
    const liveMatches = [];
    const scheduledMatches = [];
    
    // Filtro per data: corrente + max 6 giorni futuri
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const sixDaysLater = new Date(today);
    sixDaysLater.setDate(sixDaysLater.getDate() + 6);
    
    allMatches.forEach(m => {
      const realStatus = getRealMatchStatus(m);
      const matchDate = new Date(m.utcDate);
      const matchDay = new Date(matchDate.getFullYear(), matchDate.getMonth(), matchDate.getDate());
      
      if (realStatus === 'IN_PLAY') {
        liveMatches.push(m);
      } else if (realStatus === 'SCHEDULED') {
        // Filtra: solo partite dal giorno corrente fino a 6 giorni dopo
        if (selectedFilterDate) {
          // Se c'è un filtro data selezionato, mostra solo quella data
          const filterDate = new Date(selectedFilterDate);
          if (matchDay.getTime() === filterDate.getTime()) {
            scheduledMatches.push(m);
          }
        } else {
          // Default: oggi + 6 giorni
          if (matchDay >= today && matchDay <= sixDaysLater) {
            scheduledMatches.push(m);
          }
        }
      }
    });
    
    // Header con calendario
    const compName = getCompetitionName(CURRENT_COMPETITION);
    const compEmoji = getCompetitionEmoji(CURRENT_COMPETITION);
    let html = `<h2>📋 Palinsesto</h2>`;
    html += `<div class="cache-info">${getCacheInfo()} • ${liveMatches.length} LIVE • ${scheduledMatches.length} Da giocare</div>`;
    
    // Calendario per selezione data futura
    const todayStr = today.toISOString().split('T')[0];
    const maxDateStr = sixDaysLater.toISOString().split('T')[0];
    const filterValue = selectedFilterDate || '';
    
    html += `<div class="date-picker-container">
      <label>📅 Filtra per data:</label>
      <input type="date" id="filterDate" value="${filterValue}" min="${todayStr}" max="${maxDateStr}">
      <button class="btn-filter-date" onclick="applyDateFilter()">🔍 Applica</button>
      <button class="btn-reset-date" onclick="resetDateFilter()">↻ Reset</button>
      <span style="color:var(--text-dim);font-size:0.85em">Mostra partite fino a 6 giorni futuri</span>
    </div>`;
    
    // LIVE
    if (liveMatches.length > 0) {
      html += `<div style="margin-bottom:20px;padding:15px;background:linear-gradient(135deg, rgba(255,71,87,0.15), rgba(255,71,87,0.05));border-radius:10px;border:2px solid var(--danger)">
        <div style="font-size:1.3em;font-weight:700;color:var(--danger);margin-bottom:10px">🔴 IN DIRETTA (${liveMatches.length})</div>
      </div>`;
      
      // Raggruppa per campionato se ALL
      if (CURRENT_COMPETITION === 'ALL') {
        const groupedByComp = {};
        liveMatches.forEach(m => {
          const key = m._competitionKey || CURRENT_COMPETITION;
          if (!groupedByComp[key]) groupedByComp[key] = [];
          groupedByComp[key].push(m);
        });
        for (const comp in groupedByComp) {
          const compName = getCompetitionName(comp);
          const compEmoji = getCompetitionEmoji(comp);
          html += `<div class="competition-header">${compEmoji} ${compName} (${groupedByComp[comp].length} partite LIVE)</div>`;
          groupedByComp[comp].forEach(m => { html += renderMatchItem(m, true, false); });
        }
      } else {
        liveMatches.forEach(m => { html += renderMatchItem(m, true, false); });
      }
    } else {
      html += `<div style="margin-bottom:20px;padding:15px;background:linear-gradient(135deg, rgba(100,100,100,0.1), rgba(100,100,100,0.05));border-radius:10px;border:2px solid var(--text-dim)">
        <div style="font-size:1.1em;font-weight:700;color:var(--text-dim);text-align:center">📡 Nessuna partita in diretta</div>
      </div>`;
    }
    
    // Programmate - raggruppate per giornata
    if (scheduledMatches.length > 0) {
      // Raggruppa per giornata
      const groupedByDay = {};
      scheduledMatches.forEach(m => {
        const day = m.matchday || 1;
        if (!groupedByDay[day]) groupedByDay[day] = [];
        groupedByDay[day].push(m);
      });
      let sortedDays = Object.keys(groupedByDay).map(Number).sort((a, b) => a - b);
      
      // Trova giornata più vicina
      let nearestDayId = sortedDays[0];
      let minDiff = Infinity;
      sortedDays.forEach(day => {
        const matches = groupedByDay[day];
        const firstMatchDate = new Date(matches[0].utcDate);
        firstMatchDate.setHours(0,0,0,0);
        const diffDays = Math.floor((firstMatchDate - today) / (1000 * 60 * 60 * 24));
        if (diffDays >= 0 && diffDays < minDiff) { minDiff = diffDays; nearestDayId = day; }
      });
      if (minDiff === Infinity) nearestDayId = sortedDays[0];
      
      // Header prossime partite
      const firstDayDate = new Date(groupedByDay[sortedDays[0]][0].utcDate);
      const dateStr = firstDayDate.toLocaleDateString('it-IT', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
      html += `<div style="margin-top:30px;margin-bottom:15px;padding:15px;background:linear-gradient(135deg, rgba(0,212,170,0.1), rgba(0,212,170,0.05));border-radius:10px;border:2px solid var(--primary);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
        <div style="font-size:1.2em;font-weight:700;color:var(--primary)">📅 PROSSIME PARTITE - ${dateStr}</div>
        <button class="btn-today" onclick="scrollToToday()">📅 Vai a Oggi</button>
      </div>`;
      
      // Mostra partite per giornata
      sortedDays.forEach(day => {
        const matches = groupedByDay[day];
        const isFirstMatchDate = new Date(matches[0].utcDate);
        const dateStr = isFirstMatchDate.toLocaleDateString('it-IT', {day:'2-digit', month:'short'});
        const isNearestDay = day === nearestDayId;
        html += `<div class="matchday-header ${isNearestDay ? 'current-day' : ''}" id="matchday-${day}" data-match-date="${isFirstMatchDate.toISOString()}">📆 Giornata ${day} — ${matches.length} partite ${isNearestDay ? '⭐ (OGGI/PIÙ VICINA)' : ''} — ${dateStr}</div>`;
        
        // Se ALL, raggruppa per campionato all'interno della giornata
        if (CURRENT_COMPETITION === 'ALL') {
          const groupedByComp = {};
          matches.forEach(m => {
            const key = m._competitionKey || CURRENT_COMPETITION;
            if (!groupedByComp[key]) groupedByComp[key] = [];
            groupedByComp[key].push(m);
          });
          for (const comp in groupedByComp) {
            const compName = getCompetitionName(comp);
            const compEmoji = getCompetitionEmoji(comp);
            html += `<div class="competition-header" style="margin:8px 0;padding:8px 12px;font-size:1em">${compEmoji} ${compName}</div>`;
            groupedByComp[comp].forEach(m => { html += renderMatchItem(m, true, false); });
          }
        } else {
          matches.forEach(m => { html += renderMatchItem(m, true, false); });
        }
      });
    } else {
      html += `<div style="margin-top:20px;padding:20px;text-align:center;color:var(--text-dim);background:rgba(0,0,0,0.2);border-radius:10px">
        <div style="font-size:1.1em;font-weight:700">📭 Nessuna partita programmata nei prossimi 6 giorni</div>
        <div style="margin-top:10px;font-size:0.9em">Usa il calendario qui sopra per selezionare una data specifica</div>
      </div>`;
    }
    
    content.innerHTML = html;
    
    // Salva score correnti per rilevare gol live
    lastLiveScores = {};
    liveMatches.forEach(m => {
      const scoreHome = m.score?.fullTime?.home ?? m.score?.halfTime?.home ?? 0;
      const scoreAway = m.score?.fullTime?.away ?? m.score?.halfTime?.away ?? 0;
      lastLiveScores[m.id] = { home: scoreHome, away: scoreAway };
    });
    
  } catch (e) { 
    console.error('❌ Errore:', e);
    content.innerHTML = `<div class="error">❌ ${e.message}</div>`; 
  }
}

function applyDateFilter() {

function resetDateFilter() {

  showToast('↻ Filtro rimosso');

}

// ===== AGGIORNAMENTO LIVE SCORES (ogni 30 secondi) =====
async function refreshLiveScores() {
  if (currentTab !== 'upcoming' || !API_KEY || currentMatch) return;
  
  try {
    const allMatches = await loadAllMatches(true);
    const liveMatches = allMatches.filter(m => getRealMatchStatus(m) === 'IN_PLAY');
    
    liveMatches.forEach(m => {
      const currentHome = m.score?.fullTime?.home ?? m.score?.halfTime?.home ?? 0;
      const currentAway = m.score?.fullTime?.away ?? m.score?.halfTime?.away ?? 0;
      const prev = lastLiveScores[m.id] || { home: 0, away: 0 };
      
      // Rileva gol
      if (currentHome > prev.home || currentAway > prev.away) {
        const homeName = m.homeTeam.shortName || m.homeTeam.name;
        const awayName = m.awayTeam.shortName || m.awayTeam.name;
        
        if (currentHome > prev.home) {
          showToast(`⚽ GOL! ${homeName} ${currentHome}-${currentAway} ${awayName}`, 'goal');
        }
        if (currentAway > prev.away) {
          showToast(`⚽ GOL! ${homeName} ${currentHome}-${currentAway} ${awayName}`, 'goal');
        }
        
        // Aggiorna display con animazione
        const scoreEl = document.getElementById(`score-${m.id}`);
        if (scoreEl) {
          scoreEl.textContent = `[${currentHome} - ${currentAway}]`;
          scoreEl.classList.add('score-updated');
          setTimeout(() => scoreEl.classList.remove('score-updated'), 1500);
        }
      }
      
      lastLiveScores[m.id] = { home: currentHome, away: currentAway };
    });
    
    // Verifica se qualche partita è finita, ricarica tutto
    const finishedMatches = allMatches.filter(m => getRealMatchStatus(m) === 'FINISHED');
    if (finishedMatches.length > 0 && currentTab === 'upcoming') {
      // Ricarica il palinsesto per rimuovere partite finite
      const prevLiveCount = liveMatches.length;
      // Controlla se partite LIVE sono diventate FINISHED
      for (const [id, prevScore] of Object.entries(lastLiveScores)) {
        const match = allMatches.find(m => m.id == id);
        if (match && getRealMatchStatus(match) === 'FINISHED') {
          showToast(`✅ Partita terminata: ${(match.homeTeam.shortName || match.homeTeam.name)} vs ${(match.awayTeam.shortName || match.awayTeam.name)}`, 'info');
          // Ricarica completamente
          setTimeout(() => loadUpcomingMatches(), 2000);
          break;
        }
      }
    }
  } catch (e) {
    console.error('Errore refresh live:', e);
  }
}

// Refresh ogni 30 secondi per live
setInterval(refreshLiveScores, 30000);

// ===== RISULTATI ORDINATI PER CAMPIONATO E GIORNATA =====
async function loadMatches(status) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loader">Caricamento...</div>';
  try {
    allMatchesCache = null;
    const allMatches = await loadAllMatches();
    const finishedMatches = allMatches.filter(m => getRealMatchStatus(m) === 'FINISHED');
    
    if (finishedMatches.length === 0) { 
      content.innerHTML = '<div class="loader">Nessuna partita terminata</div>'; 
      return; 
    }
    
    // Raggruppa per campionato, poi per giornata
    const groupedByComp = {};
    finishedMatches.forEach(m => {
      const compKey = m._competitionKey || CURRENT_COMPETITION;
      if (!groupedByComp[compKey]) groupedByComp[compKey] = {};
      const day = m.matchday || 1;
      if (!groupedByComp[compKey][day]) groupedByComp[compKey][day] = [];
      groupedByComp[compKey][day].push(m);
    });
    
    let html = `<h2>✅ Risultati (${finishedMatches.length} partite)</h2>`;
    html += `<div class="cache-info">${getCacheInfo()}</div>`;
    html += `<div style="margin-bottom:12px;padding:10px;background:rgba(0,212,170,0.1);border-radius:8px;border-left:3px solid var(--primary);font-size:0.85em">📊 Partite terminate • Ordinate per campionato e giornata (dal più recente)</div>`;
    
    // Ordina campionati per nome
    const sortedComps = Object.keys(groupedByComp).sort((a, b) => {
      const nameA = getCompetitionName(a);
      const nameB = getCompetitionName(b);
      return nameA.localeCompare(nameB);
    });
    
    sortedComps.forEach(compKey => {
      const compName = getCompetitionName(compKey);
      const compEmoji = getCompetitionEmoji(compKey);
      const days = groupedByComp[compKey];
      
      html += `<div class="competition-header">${compEmoji} ${compName}</div>`;
      
      // Ordina giornate dalla più recente
      const sortedDays = Object.keys(days).map(Number).sort((a, b) => b - a);
      
      sortedDays.forEach(day => {
        const matches = days[day];
        matches.sort((a, b) => new Date(b.utcDate) - new Date(a.utcDate));
        html += `<div class="matchday-header">📆 Giornata ${day} — ${matches.length} partite</div>`;
        matches.forEach(m => { html += renderMatchItem(m, true, true); });
      });
    });
    
    content.innerHTML = html;
  } catch (e) { 
    content.innerHTML = `<div class="error">❌ ${e.message}</div>`; 
  }
}

function scrollToToday() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const allHeaders = document.querySelectorAll('#content .matchday-header[data-match-date]');
  let nearestHeader = null;
  let minDiff = Infinity;
  allHeaders.forEach((header) => {
    const matchDateStr = header.getAttribute('data-match-date');
    const headerDate = new Date(matchDateStr);
    headerDate.setHours(0,0,0,0);
    const diffDays = Math.floor((headerDate - today) / (1000 * 60 * 60 * 24));
    if (diffDays >= 0 && diffDays < minDiff) { 
      minDiff = diffDays; 
      nearestHeader = header;
    }
  });
  if (nearestHeader) {
    nearestHeader.scrollIntoView({ behavior: 'smooth', block: 'center' });
    nearestHeader.style.boxShadow = '0 0 30px #ffd700';
    setTimeout(() => { nearestHeader.style.boxShadow = ''; }, 2000);
  } else {
    const firstHeader = document.querySelector('#content .matchday-header');
    if (firstHeader) firstHeader.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

  if (!API_KEY) {
    document.getElementById('content').innerHTML = '<div class="error">⚠️ Inserisci la API key nelle Impostazioni</div>';

  if (currentMatch) showMatchDetail(currentMatch);
  else if (currentTab === 'upcoming') loadUpcomingMatches();

  else if (currentTab === 'standings') loadStandings();
}

}

async function loadSidebarStandings(match) {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '<div class="loader">Caricamento...</div>';
  
  try {
    const compKey = match._competitionKey || CURRENT_COMPETITION;
    const comp = LEAGUE_MAPPING[compKey];
    const data = await apiFetch(`/competitions/${comp.apiId}/standings`, true, compKey);
    
    let html = '<h3 style="color:var(--primary);margin-bottom:12px;font-size:1.1em;border-bottom:2px solid var(--border);padding-bottom:8px">🏆 Classifica</h3>';
    
    let tableData = null;
    if (data.standings.length > 1) {
      const groupStanding = data.standings.find(s => s.table.some(r => r.team.id === match.homeTeam.id || r.team.id === match.awayTeam.id));
      if (groupStanding) {
        html += `<div style="font-size:0.85em;color:var(--text-dim);margin-bottom:10px;text-align:center">${groupStanding.group || groupStanding.type}</div>`;
        tableData = groupStanding.table;
      } else {
        tableData = data.standings[0].table;
      }
    } else {
      tableData = data.standings[0].table;
    }

    if (!tableData) {
       sidebar.innerHTML = '<div class="error">Classifica non disponibile</div>';
       return;
    }

    html += `<table class="standings-table">
      <tr><th>#</th><th>Squadra</th><th style="text-align:center">Pt</th></tr>`;

    tableData.forEach(r => {
      const isMatchTeam = r.team.id === match.homeTeam.id || r.team.id === match.awayTeam.id;
      const rowClass = isMatchTeam ? 'highlight-gold' : '';
      const name = r.team.shortName || r.team.name;
      const logo = r.team.crest ? `<img src="${r.team.crest}" style="width:16px;vertical-align:middle;margin-right:4px;border-radius:50%">` : '';
      
      html += `<tr class="${rowClass}">
        <td><strong>${r.position}</strong></td>
        <td>${logo}${name}</td>
        <td style="text-align:center"><strong>${r.points}</strong></td>
      </tr>`;
    });
    
    html += '</table>';
    sidebar.innerHTML = html;

  } catch (e) {
    sidebar.innerHTML = `<div class="error" style="font-size:0.85em">❌ Classifica non disp.</div>`;
  }
}

async function getTeamForm(teamId, lastN = 5, teamName = null) {
  const allMatches = await loadAllMatches();
  
  const nameMatch = (mTeamName, targetName) => {
    if (!targetName) return false;
    const t1 = (mTeamName || '').toLowerCase();
    const t2 = (targetName || '').toLowerCase();
    return t1 === t2 || t1.includes(t2) || t2.includes(t1);
  };
  
  const teamMatches = allMatches
    .filter(m => {
      const isHomeTeam = m.homeTeam.id === teamId || nameMatch(m.homeTeam.name, teamName) || nameMatch(m.homeTeam.shortName, teamName);
      const isAwayTeam = m.awayTeam.id === teamId || nameMatch(m.awayTeam.name, teamName) || nameMatch(m.awayTeam.shortName, teamName);
      return (isHomeTeam || isAwayTeam) && m.status === 'FINISHED' && m.score?.fullTime?.home != null;
    })
    .sort((a, b) => new Date(b.utcDate) - new Date(a.utcDate))
    .slice(0, lastN);
  
  const form = [];
  const results = [];
  const opponents = [];
  let gf = 0, ga = 0;
  teamMatches.forEach(m => {
    const isHomeTeam = m.homeTeam.id === teamId || nameMatch(m.homeTeam.name, teamName) || nameMatch(m.homeTeam.shortName, teamName);
    const goalsFor = isHomeTeam ? m.score.fullTime.home : m.score.fullTime.away;
    const goalsAgainst = isHomeTeam ? m.score.fullTime.away : m.score.fullTime.home;
    const opponent = isHomeTeam ? (m.awayTeam.shortName || m.awayTeam.name) : (m.homeTeam.shortName || m.homeTeam.name);
    const venue = isHomeTeam ? 'Casa' : 'Trasferta';
    gf += goalsFor || 0;
    ga += goalsAgainst || 0;
    if (goalsFor > goalsAgainst) form.unshift('V');
    else if (goalsFor === goalsAgainst) form.unshift('P');
    else form.unshift('S');
    results.unshift(`${goalsFor}-${goalsAgainst}`);
    opponents.unshift(`vs ${opponent} (${venue})`);
  });
  return { form, results, opponents, gf, ga, matchesPlayed: teamMatches.length };
}

async function calculateRealPercentages(homeTeamId, awayTeamId, homeTeamName, awayTeamName) {
  const allMatches = await loadAllMatches();
  
  const nameMatch = (mTeamName, targetName) => {
    if (!targetName) return false;
    const t1 = (mTeamName || '').toLowerCase();
    const t2 = (targetName || '').toLowerCase();
    return t1 === t2 || t1.includes(t2) || t2.includes(t1);
  };
  
  const homeTeamAllMatches = allMatches.filter(m => {
    const isHome = m.homeTeam.id === homeTeamId || nameMatch(m.homeTeam.name, homeTeamName) || nameMatch(m.homeTeam.shortName, homeTeamName);
    const isAway = m.awayTeam.id === homeTeamId || nameMatch(m.awayTeam.name, homeTeamName) || nameMatch(m.awayTeam.shortName, homeTeamName);
    return (isHome || isAway) && m.status === 'FINISHED' && m.score?.fullTime?.home != null;
  });
  
  const awayTeamAllMatches = allMatches.filter(m => {
    const isHome = m.homeTeam.id === awayTeamId || nameMatch(m.homeTeam.name, awayTeamName) || nameMatch(m.homeTeam.shortName, awayTeamName);
    const isAway = m.awayTeam.id === awayTeamId || nameMatch(m.homeTeam.name, awayTeamName) || nameMatch(m.homeTeam.shortName, awayTeamName);
    return (isHome || isAway) && m.status === 'FINISHED' && m.score?.fullTime?.home != null;
  });

  const totalMatches = homeTeamAllMatches.length + awayTeamAllMatches.length;

  let punti1X = 0, punti12 = 0, puntiX2 = 0;

  homeTeamAllMatches.forEach(m => {
    const isHome = m.homeTeam.id === homeTeamId || nameMatch(m.homeTeam.name, homeTeamName);
    const gf = isHome ? m.score.fullTime.home : m.score.fullTime.away;
    const ga = isHome ? m.score.fullTime.away : m.score.fullTime.home;
    
    if (gf > ga) { punti1X += 1; punti12 += 1; }
    else if (gf === ga) { punti1X += 1; puntiX2 += 1; }
    else { punti12 += 1; puntiX2 += 1; }
  });

  awayTeamAllMatches.forEach(m => {
    const isHome = m.homeTeam.id === awayTeamId || nameMatch(m.homeTeam.name, awayTeamName);
    const gf = isHome ? m.score.fullTime.home : m.score.fullTime.away;
    const ga = isHome ? m.score.fullTime.away : m.score.fullTime.home;
    
    if (gf > ga) { punti12 += 1; puntiX2 += 1; }
    else if (gf === ga) { punti1X += 1; puntiX2 += 1; }
    else { punti1X += 1; punti12 += 1; }
  });

  let oneX = totalMatches > 0 ? Math.round((punti1X / totalMatches) * 100) : 0;
  let oneTwo = totalMatches > 0 ? Math.round((punti12 / totalMatches) * 100) : 0;
  let xTwo = totalMatches > 0 ? Math.round((puntiX2 / totalMatches) * 100) : 0;
  
  const allTeamMatches = [...homeTeamAllMatches, ...awayTeamAllMatches];
  
  let over15 = 0, over25 = 0, under35 = 0, under45 = 0;
  allTeamMatches.forEach(m => {
    const total = m.score.fullTime.home + m.score.fullTime.away;
    if (total > 1.5) over15++;
    if (total > 2.5) over25++;
    if (total < 3.5) under35++;
    if (total < 4.5) under45++;
  });
  
  const homeGoals = homeTeamAllMatches.map(m => {
    const isHome = m.homeTeam.id === homeTeamId || nameMatch(m.homeTeam.name, homeTeamName) || nameMatch(m.homeTeam.shortName, homeTeamName);
    return isHome ? m.score.fullTime.home : m.score.fullTime.away;
  });
  let home01 = 0, home13 = 0, home24 = 0, home25 = 0;
  homeGoals.forEach(g => {
    if (g >= 0 && g <= 1) home01++;
    if (g >= 1 && g <= 3) home13++;
    if (g >= 2 && g <= 4) home24++;
    if (g >= 2 && g <= 5) home25++;
  });
  
  const awayGoals = awayTeamAllMatches.map(m => {
    const isHome = m.homeTeam.id === awayTeamId || nameMatch(m.homeTeam.name, awayTeamName) || nameMatch(m.homeTeam.shortName, awayTeamName);
    return isHome ? m.score.fullTime.home : m.score.fullTime.away;
  });
  let away01 = 0, away13 = 0, away24 = 0, away25 = 0;
  awayGoals.forEach(g => {
    if (g >= 0 && g <= 1) away01++;
    if (g >= 1 && g <= 3) away13++;
    if (g >= 2 && g <= 4) away24++;
    if (g >= 2 && g <= 5) away25++;
  });
  
  const totalGoals = allTeamMatches.map(m => m.score.fullTime.home + m.score.fullTime.away);
  let total14 = 0, total25 = 0, homeOver15 = 0, awayOver15 = 0;
  totalGoals.forEach(g => {
    if (g >= 1 && g <= 4) total14++;
    if (g >= 2 && g <= 5) total25++;
  });
  homeGoals.forEach(g => { if (g > 1.5) homeOver15++; });
  awayGoals.forEach(g => { if (g > 1.5) awayOver15++; });
  
  const calcPerc = (count, total) => total > 0 ? Math.min(100, Math.round((count / total) * 100)) : 0;
  
  const homeWins = homeTeamAllMatches.filter(m => {
    const isHome = m.homeTeam.id === homeTeamId || nameMatch(m.homeTeam.name, homeTeamName);
    return (isHome ? m.score.fullTime.home : m.score.fullTime.away) > (isHome ? m.score.fullTime.away : m.score.fullTime.home);
  }).length;
  
  const draws = homeTeamAllMatches.filter(m => {
    const isHome = m.homeTeam.id === homeTeamId || nameMatch(m.homeTeam.name, homeTeamName);
    return (isHome ? m.score.fullTime.home : m.score.fullTime.away) === (isHome ? m.score.fullTime.away : m.score.fullTime.home);
  }).length;
  
  const awayWins = awayTeamAllMatches.filter(m => {
    const isHome = m.homeTeam.id === awayTeamId || nameMatch(m.homeTeam.name, awayTeamName);
    return (isHome ? m.score.fullTime.home : m.score.fullTime.away) > (isHome ? m.score.fullTime.away : m.score.fullTime.home);
  }).length;
  
  const homeProb = calcPerc(homeWins, homeTeamAllMatches.length);
  const drawProb = calcPerc(draws, homeTeamAllMatches.length);
  const awayProb = calcPerc(awayWins, awayTeamAllMatches.length);
  
  const homeAvgGF = homeTeamAllMatches.length > 0 ? homeGoals.reduce((sum, g) => sum + g, 0) / homeTeamAllMatches.length : 0;
  const awayAvgGF = awayTeamAllMatches.length > 0 ? awayGoals.reduce((sum, g) => sum + g, 0) / awayTeamAllMatches.length : 0;
  const expectedTotal = homeAvgGF + awayAvgGF;
  
  return {
    oneX: Math.min(100, oneX), 
    oneTwo: Math.min(100, oneTwo), 
    xTwo: Math.min(100, xTwo),
    over15: calcPerc(over15, allTeamMatches.length),
    over25: calcPerc(over25, allTeamMatches.length),
    under35: calcPerc(under35, allTeamMatches.length),
    under45: calcPerc(under45, allTeamMatches.length),
    home01: calcPerc(home01, homeGoals.length),
    home13: calcPerc(home13, homeGoals.length),
    home24: calcPerc(home24, homeGoals.length),
    home25: calcPerc(home25, homeGoals.length),
    away01: calcPerc(away01, awayGoals.length),
    away13: calcPerc(away13, awayGoals.length),
    away24: calcPerc(away24, awayGoals.length),
    away25: calcPerc(away25, awayGoals.length),
    total14: calcPerc(total14, totalGoals.length),
    total25: calcPerc(total25, totalGoals.length),
    homeOver15: calcPerc(homeOver15, homeGoals.length),
    awayOver15: calcPerc(awayOver15, awayGoals.length),
    expectedHomeGoals: homeAvgGF.toFixed(2),
    expectedAwayGoals: awayAvgGF.toFixed(2),
    expectedTotal: expectedTotal.toFixed(2),
    homeProb: Math.round(homeProb), 
    drawProb: Math.round(drawProb), 
    awayProb: Math.round(awayProb),
    stats: { 
      homeTeamMatches: homeTeamAllMatches.length, 
      awayTeamMatches: awayTeamAllMatches.length, 
      totalMatches: totalMatches 
    }
  };
}

function renderOddBox(label, value, predictions, groupKeys, match) {
  const maxValue = Math.max(...groupKeys.map(k => predictions[k]));
  const isMax = value === maxValue && groupKeys.length > 1;
  const highlightClass = isMax ? 'highlight' : '';
  
  let pendingClass = '';
  if (pendingPick && pendingPick.matchId === match.id && pendingPick.label === label) {
    pendingClass = 'pending';
  }
  
  const compName = match._competitionName || getCompetitionName(match._competitionKey || CURRENT_COMPETITION);
  const onClick = match ? `onclick="handlePickClick('${label}', ${value}, '${match.id}', '${(match.homeTeam.shortName || match.homeTeam.name).replace(/'/g, "\\'")}', '${(match.awayTeam.shortName || match.awayTeam.name).replace(/'/g, "\\'")}', '${compName.replace(/'/g, "\\'")}')"` : '';
  
  return `
    <div class="odd-box ${highlightClass} ${pendingClass}" ${onClick}>
      <div class="odd-label">${label}</div>
      <div class="odd-value">${value}%</div>
    </div>`;
}

function handlePickClick(label, value, matchId, homeName, awayName, compName) {
  if (!pendingPick) {
    pendingPick = { label, value, matchId, homeName, awayName, compName };
    showToast(`⏳ ${label} selezionato! Clicca una 2ª giocata per combo, o la stessa per singola`, 'pending');
    showPendingBanner(pendingPick);
    document.querySelectorAll('.odd-box.pending').forEach(el => el.classList.remove('pending'));
    const clickedBox = event.currentTarget;
    if (clickedBox) clickedBox.classList.add('pending');
    return;
  }
  
  if (pendingPick.label === label && pendingPick.matchId === matchId) {
    addToSlip(label, value, matchId, homeName, awayName, null, compName);
    pendingPick = null;
    removePendingBanner();
    document.querySelectorAll('.odd-box.pending').forEach(el => el.classList.remove('pending'));
    return;
  }
  
  createCombo(pendingPick, { label, value, matchId, homeName, awayName, compName });
  pendingPick = null;
  removePendingBanner();
  document.querySelectorAll('.odd-box.pending').forEach(el => el.classList.remove('pending'));
}

function createCombo(pick1, pick2) {
  if (pick1.matchId !== pick2.matchId) {
    showToast('⚠️ Le combo devono essere della stessa partita!', 'error');
    return;
  }
  
  const dcLabels = ['1X', '12', 'X2'];
  const ouLabels = ['Over 1,5', 'Over 2,5', 'Under 3,5', 'Under 4,5'];
  const totalLabels = ['1-4', '2-5'];
  
  const isDC1 = dcLabels.includes(pick1.label);
  const isDC2 = dcLabels.includes(pick2.label);
  const isOU1 = ouLabels.includes(pick1.label);
  const isOU2 = ouLabels.includes(pick2.label);
  const isTotal1 = totalLabels.includes(pick1.label);
  const isTotal2 = totalLabels.includes(pick2.label);
  
  let comboLabel = '';
  
  if ((isDC1 && isOU2) || (isDC2 && isOU1)) {
    const dc = isDC1 ? pick1 : pick2;
    const ou = isDC1 ? pick2 : pick1;
    comboLabel = `${dc.label}+${ou.label}`;
  } else if ((isDC1 && isTotal2) || (isDC2 && isTotal1)) {
    const dc = isDC1 ? pick1 : pick2;
    const total = isDC1 ? pick2 : pick1;
    comboLabel = `${dc.label}+Multigol Totale ${total.label}`;
  } else {
    comboLabel = `${pick1.label}+${pick2.label}`;
  }
  
  const avgValue = Math.round((pick1.value + pick2.value) / 2);
  const matchDate = new Date().toLocaleString('it-IT');
  
  const pick = {
    id: Date.now() + '_' + Math.random().toString(36).substr(2, 5),
    matchId: pick1.matchId,
    homeTeam: pick1.homeName,
    awayTeam: pick1.awayName,
    competition: pick1.compName,
    date: matchDate,
    market: comboLabel,
    value: avgValue,
    odds: 1.50,
    isCombo: true,
    picks: [pick1, pick2],
    status: 'pending'
  };
  
  currentSlip.picks.push(pick);
  saveCurrentSlip();
  showToast(`✅ Combo ${comboLabel} aggiunta!`);
}

function addToSlip(label, value, matchId, homeName, awayName, oddsKey, compName) {
  const pick = {
    id: Date.now() + '_' + Math.random().toString(36).substr(2, 5),
    matchId: matchId,
    homeTeam: homeName,
    awayTeam: awayName,
    competition: compName || '',
    date: new Date().toLocaleString('it-IT'),
    market: label,
    value: value,
    odds: 1.50,
    isCombo: false,
    status: 'pending'
  };
  const exists = currentSlip.picks.find(p => p.matchId === pick.matchId && p.market === pick.market);
  if (exists) {
    showToast('⚠️ Giocata già presente', 'error');
    return;
  }
  currentSlip.picks.push(pick);
  saveCurrentSlip();
  showToast(`✅ ${label} @${value}% aggiunto!`);
}

function removeFromSlip(pickId) {
  currentSlip.picks = currentSlip.picks.filter(p => p.id !== pickId);
  saveCurrentSlip();
  showToast('🗑️ Giocata rimossa');
  showSlip();
}

function saveCurrentSlip() {
  localStorage.setItem('currentSlip', JSON.stringify(currentSlip));
}

function clearSlip() {
  if (confirm('Svuotare la schedina?')) {
    currentSlip = { picks: [] };
    saveCurrentSlip();
    showToast('🗑️ Schedina svuotata');
    showSlip();
  }
}

function saveSlip() {
  if (currentSlip.picks.length === 0) { showToast('⚠️ Schedina vuota!', 'error'); return; }
  const name = prompt('Nome della schedina:', `Schedina ${new Date().toLocaleDateString('it-IT')}`);
  if (!name) return;
  const savedSlips = JSON.parse(localStorage.getItem('savedSlips') || '[]');
  const slipToSave = {
    id: 'SLIP_' + Date.now(),
    name: name,
    createdAt: new Date().toISOString(),
    picks: [...currentSlip.picks],
    status: 'open'
  };
  savedSlips.push(slipToSave);
  localStorage.setItem('savedSlips', JSON.stringify(savedSlips));
  showToast(`✅ Schedina "${name}" salvata!`);
  showSlip();
}

function loadSlip(slipId) {
  const savedSlips = JSON.parse(localStorage.getItem('savedSlips') || '[]');
  const slip = savedSlips.find(s => s.id === slipId);
  if (!slip) { showToast('⚠️ Non trovata', 'error'); return; }
  currentSlip = { picks: [...slip.picks] };
  saveCurrentSlip();
  showToast(`📂 Schedina "${slip.name}" caricata!`);
  showSlip();
}

function deleteSlip(slipId) {
  if (!confirm('Eliminare?')) return;
  let savedSlips = JSON.parse(localStorage.getItem('savedSlips') || '[]');
  savedSlips = savedSlips.filter(s => s.id !== slipId);
  localStorage.setItem('savedSlips', JSON.stringify(savedSlips));
  showToast('🗑️ Eliminata');
  showSlip();
}

async function autoSelectPicks(count) {
  if (!API_KEY) { showToast('⚠️ Configura API key', 'error'); return; }
  showToast(`🤖 Analisi per ${count} partite...`);
  try {
    allMatchesCache = null;
    const allMatches = await loadAllMatches();
    const futureMatches = allMatches.filter(m => getRealMatchStatus(m) === 'SCHEDULED');
    if (futureMatches.length === 0) { showToast('⚠️ Nessuna partita futura', 'error'); return; }
    
    const bestPicks = [];
    for (const match of futureMatches) {
      try {
        const homeName = match.homeTeam.shortName || match.homeTeam.name;
        const awayName = match.awayTeam.shortName || match.awayTeam.name;
        const predictions = await calculateRealPercentages(match.homeTeam.id, match.awayTeam.id, homeName, awayName);
        
        const allBets = [
          { label: '1X', value: predictions.oneX }, { label: '12', value: predictions.oneTwo }, { label: 'X2', value: predictions.xTwo },
          { label: 'Over 1,5', value: predictions.over15 }, { label: 'Over 2,5', value: predictions.over25 }, { label: 'Under 3,5', value: predictions.under35 }
        ];
        
        allBets.sort((a, b) => b.value - a.value);
        const best = allBets[0];
        const secondBest = allBets[1];
        
        if (best.value === secondBest.value && best.value > 0) {
          bestPicks.push({ match, predictions, isCombo: true, pick1: best, pick2: secondBest, avgValue: best.value });
        } else {
          bestPicks.push({ match, predictions, isCombo: false, pick: best, avgValue: best.value });
        }
      } catch (e) { console.error(`Errore:`, e); }
    }
    
    bestPicks.sort((a, b) => b.avgValue - a.avgValue);
    const selected = bestPicks.slice(0, count);
    
    let added = 0;
    for (const item of selected) {
      const homeName = item.match.homeTeam.shortName || item.match.homeTeam.name;
      const awayName = item.match.awayTeam.shortName || item.match.awayTeam.name;
      const compName = item.match._competitionName || '';
      if (item.isCombo && item.pick1 && item.pick2) {
        createCombo(
          { label: item.pick1.label, value: item.pick1.value, matchId: item.match.id, homeName, awayName, compName },
          { label: item.pick2.label, value: item.pick2.value, matchId: item.match.id, homeName, awayName, compName }
        );
        added++;
      } else if (item.pick) {
        addToSlip(item.pick.label, item.pick.value, item.match.id, homeName, awayName, null, compName);
        added++;
      }
    }
    
    showToast(`✅ ${added} giocate aggiunte!`);
    showSlip();
    
  } catch (e) {
    console.error('Errore:', e);
    showToast('❌ Errore: ' + e.message, 'error');
  }
}

function getSlipText() {
  if (currentSlip.picks.length === 0) return '';
  let text = `⚽ GesssAI - Schedina AI\n📅 ${new Date().toLocaleDateString('it-IT')}\n━━━━━━━━━━━━━━━━━━━━\n\n`;
  currentSlip.picks.forEach((pick, i) => {
    const compText = pick.competition ? `[${pick.competition}] ` : '';
    text += `${i+1}. ${compText}${pick.homeTeam} vs ${pick.awayTeam}\n`;
    if (pick.isCombo) { text += `   🎯 COMBO: ${pick.market} (${pick.value}%)\n`; } 
    else { text += `   📊 ${pick.market} (${pick.value}%)\n`; }
    text += `\n`;
  });
  text += `━━━━━━━━━━━━━━━━━━━━\n🎯 Totale: ${currentSlip.picks.length}\n⚽ GesssAI - LIVE`;
  return text;
}

function copySlipText() {
  const text = getSlipText();
  if (!text) { showToast('⚠️ Schedina vuota', 'error'); return; }
  navigator.clipboard.writeText(text).then(() => { showToast('📋 Schedina copiata!'); }).catch(() => {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    try { document.execCommand('copy'); showToast('📋 Copiata!'); } catch (e) { showToast('❌ Errore', 'error'); }
    document.body.removeChild(textarea);
  });
}

async function loadAIAnalysis(match, homeStats, awayStats, predictions, forceRefresh = false) {
  const aiElement = document.getElementById('aiAnalysis');
  const btnRegenerate = document.getElementById('btnRegenerate');
  if (!GROQ_KEY) { aiElement.innerHTML = `<em>⚠️ Inserisci la GROQ API key nelle Impostazioni</em>`; return; }
  const cacheKey = `ai_${match.id || `${match.homeTeam.name}_${match.awayTeam.name}_${match.utcDate}`}`;
  if (!forceRefresh) { const cached = getCache(cacheKey); if (cached) { aiElement.innerHTML = cached; return; } }
  btnRegenerate.disabled = true;
  aiElement.innerHTML = '<div class="ai-loading">Elaborazione...</div>';
  try {
    const prompt = buildGroqPrompt(match, homeStats, awayStats, predictions);
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${GROQ_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [
          { role: 'system', content: 'Sei un esperto analista di calcio. Rispondi in italiano.' },
          { role: 'user', content: prompt }
        ],
        temperature: 0.7,
        max_tokens: 1500,
        top_p: 0.9
      })
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    if (!data.choices || !data.choices[0]?.message?.content) throw new Error('Risposta non valida');
    const aiText = data.choices[0].message.content;
    const formatted = formatAIText(aiText);
    aiElement.innerHTML = formatted;
    setCache(cacheKey, formatted);
  } catch (e) { 
    console.error('❌ Errore GROQ:', e);
    aiElement.innerHTML = `<em>❌ Errore GROQ: ${e.message}</em>`; 
  } finally { btnRegenerate.disabled = false; }
}

function buildGroqPrompt(match, homeStats, awayStats, predictions) {
  const homeName = match.homeTeam.shortName || match.homeTeam.name;
  const awayName = match.awayTeam.shortName || match.awayTeam.name;
  const date = new Date(match.utcDate).toLocaleString('it-IT');
  const compName = match._competitionName || '';
  return `Analizza questa partita: ${homeName} vs ${awayName}
Campionato: ${compName}
Data: ${date}
1X: ${predictions.oneX}% | 12: ${predictions.oneTwo}% | X2: ${predictions.xTwo}%
Over 1.5: ${predictions.over15}% | Over 2.5: ${predictions.over25}% | Under 3.5: ${predictions.under35}% | Under 4.5: ${predictions.under45}%
Gol attesi: Casa ${predictions.expectedHomeGoals} | Ospite ${predictions.expectedAwayGoals} | Totale ${predictions.expectedTotal}
Forma Casa: ${homeStats.form.join(', ')} (${homeStats.matchesPlayed} partite, ${homeStats.gf} GF, ${homeStats.ga} GS)
Forma Ospite: ${awayStats.form.join(', ')} (${awayStats.matchesPlayed} partite, ${awayStats.gf} GF, ${awayStats.ga} GS)

Fornisci pronostico dettagliato con 1X2, Over/Under, Doppia Chance, Multigol e consiglio finale con confidenza.`;
}

function formatAIText(text) {
  return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*(.+?)\*/g, '<em>$1</em>').replace(/\n/g, '<br>').replace(/•/g, '&bull;');
}

function regenerateAI() {
  if (currentMatch) {
    const cacheKey = `ai_${currentMatch.id || `${currentMatch.homeTeam.name}_${currentMatch.awayTeam.name}_${currentMatch.utcDate}`}`;

    showMatchDetail(currentMatch);

async function loadStandings() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loader">Caricamento classifica...</div>';
  try {
    const comp = LEAGUE_MAPPING[CURRENT_COMPETITION];
    const data = await apiFetch(`/competitions/${comp.apiId}/standings`);
    let html = '<h2>🏆 Classifica</h2>';
    html += `<div class="cache-info">${getCacheInfo()}</div>`;
    if (CURRENT_COMPETITION === 'WC' && data.standings.length > 1) {
      data.standings.forEach(standing => {
        html += `<div class="matchday-header">${standing.group || standing.type}</div>`;
        html += renderStandingsTable(standing.table);
      });
    } else if (data.standings && data.standings.length > 0) { 
      html += renderStandingsTable(data.standings[0].table); 
    }
    content.innerHTML = html;
  } catch (e) { 
    console.error('❌ Errore:', e);
    content.innerHTML = `<div class="error">❌ ${e.message}</div>`; 
  }
}

function renderStandingsTable(table) {
  let html = `<table class="standings-table"><tr><th>#</th><th>Squadra</th><th>G</th><th>V</th><th>N</th><th>S</th><th>Pt</th></tr>`;
  table.forEach(r => {
    const logo = r.team.crest || '';
    const name = r.team.shortName || r.team.name;
    const logoHtml = logo ? `<img src="${logo}" style="width:20px;vertical-align:middle;margin-right:6px;border-radius:50%">` : `${renderLogo(name)} `;
    html += `<tr><td><strong>${r.position}</strong></td><td>${logoHtml}${name}</td><td style="text-align:center">${r.playedGames}</td><td style="text-align:center">${r.won}</td><td style="text-align:center">${r.draw}</td><td style="text-align:center">${r.lost}</td><td style="text-align:center"><strong style="color:var(--primary)">${r.points}</strong></td></tr>`;
  });
  html += '</table>';
  return html;
}
